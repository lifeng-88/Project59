<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden">
<!-- Top Navigation -->

</div>

<div class="text-on-surface py-2 cursor-pointer transition-colors rounded-full hover:bg-primary/5">2</div>

<div class="py-2 cursor-pointer transition-colors rounded-full hover:bg-primary/5">3</div>
<div class="py-2 cursor-pointer transition-colors rounded-full hover:bg-primary/5">4</div>
<div class="py-2 cursor-pointer transition-colors rounded-full hover:bg-primary/5">5</div>
<div class="py-2 relative cursor-pointer transition-colors rounded-full hover:bg-primary/5">
<span class="z-10 relative">6</span>
<div class="absolute inset-0 m-auto w-8 h-8 bg-primary rounded-full -z-0 flex items-center justify-center text-on-primary font-bold">6</div>
</div>

<div class="py-2 cursor-pointer transition-colors rounded-full hover:bg-primary/5">8</div>

                    12

</div>

</section>
<!-- Schedule View -->

</div>
</div>
</div>
</section>
<!-- Empty State / Suggestion -->

<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-stack-md">

</div>

</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-surface rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="today">today</span>
<span class="text-label-sm font-label-sm">䇊攥</span>
</button>
<button class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-lowest transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="calendar_month" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<span class="text-label-sm font-label-sm">攥历</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="text-label-sm font-label-sm">分析</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-label-sm font-label-sm">设置</span>
</button>
</nav>
<!-- Floating Action Button - Contextual to main screens -->
<button class="fixed bottom-24 right-margin-page w-14 h-14 bg-primary text-on-primary rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.08)] flex items-center justify-center transition-transform hover:scale-105 active:scale-95 z-50">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<script>
        // Micro-interaction for calendar days
        document.querySelectorAll('.grid > div').forEach(day => {
            if (day.innerText && !day.classList.contains('text-outline')) {
                day.classList.add('cursor-pointer', 'transition-colors', 'rounded-full', 'hover:bg-primary/5');
            }
        });

        // Atmospheric parallax or simple scroll reveal could go here
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm', 'bg-surface/80', 'backdrop-blur-md');
            } else {
                header.classList.remove('shadow-sm', 'bg-surface/80', 'backdrop-blur-md');
            }
        });
    </script>
