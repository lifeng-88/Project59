name: iOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Hub (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: xcodebuild -version

      - name: Build Hub
        run: |
          xcodebuild \
            -project Hub.xcodeproj \
            -scheme Hub \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build
        env:
          NSUnbufferedIO: "YES"
