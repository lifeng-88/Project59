# App Store 自动打包上传
#
# 前置条件（Apple Developer + App Store Connect）：
#   1. 在 developer.apple.com 为 Bundle ID「com.Hub.Lumina」开启所需 Capability
#      （推送、iCloud 等，与 Hub.entitlements 一致）
#   2. 在 App Store Connect 创建应用条目（Bundle ID 一致）
#   3. 创建 App Store Connect API Key（角色建议 App Manager 或 Admin）
#
# 在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#
#   Secrets（敏感）:
#     APPSTORE_API_PRIVATE_KEY   — API Key 的 .p8 文件完整内容
#     BUILD_CERTIFICATE_BASE64   — 分发证书 .p12 经 base64 编码（openssl base64 -i cert.p12 | pbcopy）
#     P12_PASSWORD               — .p12 导出密码
#
#   Variables（非敏感，也可用 Secrets）:
#     APPSTORE_ISSUER_ID         — App Store Connect → 用户与访问 → 集成 → Issuer ID
#     APPSTORE_API_KEY_ID        — API Key 的 Key ID
#     DEVELOPMENT_TEAM           — Apple Team ID（10 位，如 ABCDE12345）
#
# 触发方式：
#   - 推送版本标签 v*（如 v1.0.0）自动发布
#   - Actions 页手动 Run workflow

name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "营销版本号（留空则使用项目当前 MARKETING_VERSION）"
        required: false
        type: string
      release_notes:
        description: "TestFlight 构建说明（可选）"
        required: false
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  SCHEME: Hub
  PROJECT: Hub.xcodeproj
  BUNDLE_ID: com.Hub.Lumina
  ARCHIVE_PATH: ${{ runner.temp }}/Hub.xcarchive
  EXPORT_PATH: ${{ runner.temp }}/export
  IPA_PATH: ${{ runner.temp }}/export/Hub.ipa
  API_KEY_DIR: ${{ runner.temp }}/private_keys

jobs:
  release:
    name: Archive & Upload to App Store Connect
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=()
          for key in APPSTORE_API_PRIVATE_KEY BUILD_CERTIFICATE_BASE64 P12_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key (secret)")
            fi
          done
          for key in APPSTORE_ISSUER_ID APPSTORE_API_KEY_ID DEVELOPMENT_TEAM; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key (variable/secret)")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::缺少以下配置："
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM || secrets.DEVELOPMENT_TEAM }}

      - name: Resolve version numbers
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            MARKETING_VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.marketing_version }}" ]; then
            MARKETING_VERSION="${{ inputs.marketing_version }}"
          else
            MARKETING_VERSION=$(xcodebuild -showBuildSettings -project "$PROJECT" -scheme "$SCHEME" -configuration Release 2>/dev/null \
              | awk -F' = ' '/MARKETING_VERSION/{print $2; exit}')
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Marketing Version: $MARKETING_VERSION"
          echo "Build Number: $BUILD_NUMBER"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Download App Store provisioning profile
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$API_KEY_DIR"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            DEVELOPMENT_TEAM="${{ vars.DEVELOPMENT_TEAM || secrets.DEVELOPMENT_TEAM }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          NSUnbufferedIO: "YES"

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ci/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"
        env:
          APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          release-notes: ${{ inputs.release_notes }}
          uses-non-exempt-encryption: "false"
          wait-for-processing: "true"
