# App Store 自动打包上传
#
# 前置条件（Apple Developer + App Store Connect）：
#   1. 在 developer.apple.com 为 Bundle ID「com.Hub.Lumina」开启所需 Capability
#      （推送、iCloud 等，与 Hub.entitlements 一致）
#   2. 在 App Store Connect 创建应用条目（Bundle ID 一致）
#   3. 创建 App Store Connect API Key（角色建议 App Manager 或 Admin）
#
# 在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#
#   Secrets:
#     APPSTORE_API_PRIVATE_KEY        — API Key 的 .p8 完整内容，或 .p8 的 base64（上传用）
#     APPSTORE_ISSUER_ID              — Issuer ID
#     APPSTORE_API_KEY_ID             — Key ID
#     DEVELOPMENT_TEAM                — Apple Team ID（10 位，如 F3Y944AQ9F）
#     BUILD_CERTIFICATE_BASE64        — 分发证书 .p12 的 base64
#     P12_PASSWORD                    — .p12 导出密码
#     BUILD_PROVISION_PROFILE_BASE64  — HubLumina.mobileprovision 的 base64
#
# 触发方式：
#   - 推送版本标签 v*（如 v1.0.0）自动发布
#   - Actions 页手动 Run workflow

name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "营销版本号（留空则使用项目当前 MARKETING_VERSION）"
        required: false
        type: string
      release_notes:
        description: "TestFlight 构建说明（可选）"
        required: false
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Archive & Upload to App Store Connect
    runs-on: macos-15
    timeout-minutes: 60
    env:
      SCHEME: Hub
      PROJECT: Hub.xcodeproj
      BUNDLE_ID: com.Hub.Lumina

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=()
          for key in \
            APPSTORE_API_PRIVATE_KEY \
            APPSTORE_ISSUER_ID \
            APPSTORE_API_KEY_ID \
            DEVELOPMENT_TEAM \
            BUILD_CERTIFICATE_BASE64 \
            P12_PASSWORD \
            BUILD_PROVISION_PROFILE_BASE64
          do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::缺少以下 Secrets："
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

      - name: Resolve version numbers
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.marketing_version }}"
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            MARKETING_VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "$INPUT_VERSION" ]; then
            MARKETING_VERSION="$INPUT_VERSION"
          else
            MARKETING_VERSION=$(xcodebuild -showBuildSettings -project "$PROJECT" -scheme "$SCHEME" -configuration Release 2>/dev/null \
              | awk -F' = ' '/MARKETING_VERSION/{print $2; exit}')
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Marketing Version: $MARKETING_VERSION"
          echo "Build Number: $BUILD_NUMBER"

      - name: Generate Lumina brand assets
        run: |
          set -euo pipefail
          python3 -m pip install --quiet Pillow
          python3 scripts/generate_lumina_brand_assets.py

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/HubLumina.mobileprovision"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

      - name: Archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/Hub.xcarchive"
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          NSUnbufferedIO: "YES"

      - name: Export IPA
        run: |
          set -euo pipefail
          EXPORT_PATH="$RUNNER_TEMP/export"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          cp ci/ExportOptions.plist "$EXPORT_OPTIONS"
          /usr/libexec/PlistBuddy -c "Add :teamID string $DEVELOPMENT_TEAM" "$EXPORT_OPTIONS" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :teamID $DEVELOPMENT_TEAM" "$EXPORT_OPTIONS"
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:$BUNDLE_ID $PROVISIONING_PROFILE_SPECIFIER" "$EXPORT_OPTIONS"
          echo "Available signing identities:"
          security find-identity -v -p codesigning
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS"
          echo "IPA_PATH=$EXPORT_PATH/Hub.ipa" >> "$GITHUB_ENV"
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

      - name: Prepare and validate API key
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          export KEY_FILE
          python3 - <<'PY'
          import base64, os, re, subprocess, sys, textwrap

          raw = os.environ["APPSTORE_API_PRIVATE_KEY"].strip()
          key_id = os.environ["APPSTORE_API_KEY_ID"]
          key_file = os.environ["KEY_FILE"]

          def write_pem(body: str) -> None:
              body = re.sub(r"\s+", "", body)
              lines = ["-----BEGIN PRIVATE KEY-----", *textwrap.wrap(body, 64), "-----END PRIVATE KEY-----"]
              with open(key_file, "w", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")

          def sanitize_pem_text(text: str) -> str:
              text = text.strip().replace("\\n", "\n")
              text = re.sub(r"-----END PRIVATE KEY-----+", "-----END PRIVATE KEY-----", text)
              match = re.search(
                  r"-----BEGIN PRIVATE KEY-----(.*?)-----END PRIVATE KEY-----",
                  text,
                  re.S,
              )
              if not match:
                  return text
              write_pem(match.group(1))
              return open(key_file, encoding="utf-8").read()

          def try_openssl(path: str) -> bool:
              result = subprocess.run(
                  ["openssl", "pkey", "-in", path, "-noout"],
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  print(result.stderr.strip())
              return result.returncode == 0

          candidates: list[bytes] = []

          if "\\n" in raw:
              raw = bytes(raw, "utf-8").decode("unicode_escape")

          if "BEGIN PRIVATE KEY" in raw:
              sanitize_pem_text(raw)
              if try_openssl(key_file):
                  sys.exit(0)
              candidates.append(raw.encode("utf-8"))
          else:
              compact = re.sub(r"\s+", "", raw)
              for payload in (compact, compact + "=="):
                  try:
                      candidates.append(base64.b64decode(payload, validate=False))
                  except Exception:
                      pass

          for data in candidates:
              with open(key_file, "wb") as fh:
                  fh.write(data)
              if try_openssl(key_file):
                  sys.exit(0)
              text = data.decode("utf-8", errors="ignore")
              match = re.search(
                  r"-----BEGIN PRIVATE KEY-----(.*?)-----END PRIVATE KEY-----",
                  text,
                  re.S,
              )
              if match:
                  write_pem(match.group(1))
                  if try_openssl(key_file):
                      sys.exit(0)

          print(f"::error::无法解析 APPSTORE_API_PRIVATE_KEY（Key ID: {key_id}）")
          print("请删除该 Secret 后重新创建，推荐使用 base64 单行格式：")
          print(f"  base64 -i AuthKey_{key_id}.p8 | tr -d '\\n' | pbcopy")
          sys.exit(1)
          PY
          chmod 600 "$KEY_FILE"
          openssl pkey -in "$KEY_FILE" -noout
          echo "API 私钥格式验证通过"
          mkdir -p "$HOME/private_keys"
          cp "$KEY_FILE" "$HOME/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          echo "API key installed to ~/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          KEY_FILE: ${{ runner.temp }}/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail
          LOG_FILE="$RUNNER_TEMP/altool-upload.log"
          if ! xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --verbose 2>&1 | tee "$LOG_FILE"; then
            echo "::error::IPA 上传失败，请查看上方 Validation 错误信息"
            exit 1
          fi
          if grep -q "UPLOAD FAILED\|Validation failed\|Failed to upload package" "$LOG_FILE"; then
            echo "::error::IPA 校验未通过，构建已被 Apple 拒绝"
            exit 1
          fi
          echo "上传成功。请在 App Store Connect → TestFlight 等待处理（通常 5–30 分钟）。"
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
